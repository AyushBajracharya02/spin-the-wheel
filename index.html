<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <link rel="icon" type="image/svg+xml" href="/vite.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Spin The Wheel</title>
      <script type="module" src="/src/main.ts" defer></script>
      <link rel="stylesheet" href="/src/css/index.css" />
   </head>
   <body class="bg-dark-base text-white">
      <section class="p-5">
         <div class="container">
            <div class="w-fit mx-auto bg-dark-elevated rounded-[28px]">
               <div
                  class="flex items-center justify-between px-8 py-4 border-b border-dark-deep"
               >
                  <h1 class="font-medium text-xl">Spin The Wheel</h1>
                  <div class="">
                     <h2 class="text-xs">Balance</h2>
                     <p class="text-lg">1,250</p>
                  </div>
               </div>
               <div class="px-8 py-6">
                  <div class="relative w-100 disk-outer drop-shadow-wheel/25">
                     <div class="absolute absolute-center-x -translate-y-1/2">
                        <img src="/assets/images/arrow.png" alt="" />
                     </div>
                     <div class="disk-inner p-1.5">
                        <canvas class="w-full h-full" id="wheel"> </canvas>
                     </div>
                     <button
                        id="spin-button"
                        class="p-1.5 absolute absolute-center w-27.5 disk-outer drop-shadow-md drop-shadow-black/25"
                     >
                        <div class="disk-inner content-center">
                           <span class="font-bold text-2xl leading-none">
                              Spin
                           </span>
                        </div>
                     </button>
                  </div>
               </div>
            </div>
         </div>
      </section>
      <dialog
         class="w-106 absolute-center rounded-2xl backdrop:bg-black/80 backdrop:blur-2xl bg-transparent"
         id="prize-dialog"
      >
         <div class="py-3 bg-[#242833] border-b-2 border-b-black">
            <h2 class="text-3xl text-center font-semibold text-white">
               Congratulations!
            </h2>
         </div>
         <div class="py-5 bg-[#1A2029]">
            <div class="w-8/10 mx-auto">
               <img src="" alt="" id="prize-image" />
            </div>
            <div class="mt-6">
               <p
                  class="text-2xl text-center text-white"
                  id="prize-message"
               ></p>
            </div>
            <div class="flex justify-center mt-6">
               <button class="btn" id="prize-dialog-close">OK</button>
            </div>
         </div>
      </dialog>
   </body>
</html>
